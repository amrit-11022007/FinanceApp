<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card-container">
      <!-- Added this wrapper -->
      <div class="card">
        <div class="card-front">
          <form id="loginForm">
            <h2>Welcome back</h2>
            <input
              type="email"
              id="email"
              placeholder="Email"
              autocomplete="off"
            />
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
            <input type="submit" value="Sign In" />
            <span
              >New User? <a href="#" id="registerLink">Create account</a></span
            >
          </form>
        </div>
        <div class="card-back">
          <form id="registerForm">
            <h2>Create Account</h2>
            <input
              type="text"
              id="name"
              placeholder="Full Name"
              autocomplete="off"
              required
            />
            <input
              type="email"
              id="regEmail"
              placeholder="Email"
              autocomplete="off"
              required
            />
            <input
              type="password"
              id="regPassword"
              placeholder="Password"
              required
            />
            <input type="submit" value="Register" />
            <span
              >Already have an account?
              <a href="#" id="loginLink">Sign In</a></span
            >
          </form>
        </div>
      </div>
    </div>
    <!-- <p id="id"></p> -->
  </body>
  <script src="script.js"></script>
</html>
