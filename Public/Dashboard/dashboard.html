<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <span>&#8801;</span>
      <span class="logo">FinTrac</span>
      <ul class="nav-list">
        <li><a href="#" class="active">Dashboard</a></li>
        <li><a href="#">Income</a></li>
        <li><a href="#">Expenses</a></li>
        <li><a href="#">Settings</a></li>
      </ul>
      <button class="circular-profile" id="dashboard-profile-icon">F</button>
    </nav>
    <div class="container">
      <section class="expense-summary">
        <aside>
          <h6>Income</h6>
          <br /><span class="amount" id="total-income"></span>
        </aside>
        <aside>
          <h6>Expenses</h6>
          <br /><span class="amount" id="total-expense"></span>
        </aside>
        <aside>
          <h6>Savings</h6>
          <br /><span class="amount" id="total-saving"></span>
        </aside>
      </section>
      <section class="overview">

        <!-- Overall -->
        <div class="recent-transaction">
          <h1>Overall Transactions</h1>
          <ul id="transaction-list">
          </ul>
        </div>
        <div class="pie-chart-recent">
          <div class="chart-container">
            <canvas id="expense-pie-chart"></canvas>
          </div>
        </div>

        <!-- Expenses -->
        <div class="expenses">
          <h1>Expenditure</h1>
          <ul id="expense-list">
          </ul>
        </div>
        <div class="pie-chart-expenses">
          <canvas id="expense-bar-chart"></canvas>
        </div>

        <!-- Income -->
        <div class="income">
          <h1>Income</h1>
          <ul id="income-list">
          </ul>
        </div>
        <div class="pie-chart-income">
          <canvas id="income-bar-chart"></canvas>
        </div>
      </section>
    </div>
    <div class="overlay hidden" id="overlay">
      <div class="failure">
        <span class="excla">!</span>
        <p id="failureId"></p>
        <span>Try Again Later</span>
      </div>
    </div>
  </body>
  <script src="dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</html>
