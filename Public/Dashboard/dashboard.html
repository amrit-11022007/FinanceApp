<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../styles/profile.css" />
  </head>
  <body>
    <nav>
      <span>&#8801;</span>
      <span class="logo">FinTrac</span>
      <ul class="nav-list">
        <li><a href="#" class="active">Dashboard</a></li>
        <li><a href="../Income/income.html">Income</a></li>
        <li><a href="../Expense/expense.html">Expenses</a></li>
        <li><a href="../Settings/setting.html">Settings</a></li>
      </ul>
      <button class="circular-profile" id="dashboard-profile-icon">F</button>
    </nav>

    <div class="container">
      <section class="expense-summary">
        <aside>
          <h6>Income</h6>
          <span class="amount" id="total-income"></span>
        </aside>
        <aside>
          <h6>Expenses</h6>
          <span class="amount" id="total-expense"></span>
        </aside>
        <aside>
          <h6>Savings</h6>
          <span class="amount" id="total-saving"></span>
        </aside>
      </section>

      <section class="overview">
        <!-- Overall -->
        <div class="recent-transaction">
          <h1>Overall Transactions</h1>
          <ul id="transaction-list"></ul>
        </div>
        <div class="pie-chart-recent">
          <div class="chart-container">
            <canvas id="expense-pie-chart"></canvas>
          </div>
        </div>

        <!-- Expenses -->
        <div class="expenses">
          <h1>Expenditure</h1>
          <ul id="expense-list"></ul>
        </div>
        <div class="pie-chart-expenses">
          <canvas id="expense-bar-chart"></canvas>
        </div>

        <!-- Income -->
        <div class="income">
          <h1>Income</h1>
          <ul id="income-list"></ul>
        </div>
        <div class="pie-chart-income">
          <canvas id="income-bar-chart"></canvas>
        </div>
      </section>
    </div>

    <div class="overlay hidden" id="overlay">
      <div class="failure">
        <span class="excla">!</span>
        <p id="failureId"></p>
        <span>Try Again Later</span>
      </div>
    </div>
    <div class="profile hidden" id="profile">
      <div class="profile-content">
        <h2>Name: <span id="profile-name"></span></h2>
        <p>Email: <span id="profile-email"></span></p>
        <div class="profile-buttons">
          <button id="manage-profile">Manage Profile</button>
          <button id="logout">Logout</button>
          <button id="close">close</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="dashboard.js"></script>
  </body>
</html>
